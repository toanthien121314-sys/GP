<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Typer - Luyện Gõ 10 Ngón</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="stats-container">
            <div class="stat-item">WPM: <span id="wpm">0</span></div>
            <div class="stat-item">Accuracy: <span id="accuracy">100</span>%</div>
            <div class="stat-item">Time: <span id="timer">30</span>s</div>
        </div>

        <div class="typing-box" id="typing-box">
            </div>

        <input type="text" id="hidden-input" autofocus>
        
        <button id="restart-btn">Làm lại (ESC)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
